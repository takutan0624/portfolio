<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Training Log thumbnail</title>
  <desc id="desc">Dark dashboard-style thumbnail for a gym training log app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="0.55" stop-color="#000000"/>
      <stop offset="1" stop-color="#120c04"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9f0a"/>
      <stop offset="1" stop-color="#ff7113"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.05" r="0.7">
      <stop offset="0" stop-color="#ff9f0a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff9f0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <rect x="96" y="78" width="1088" height="644" rx="36" fill="#0f0f12" filter="url(#shadow)"/>
  <rect x="96" y="78" width="1088" height="644" rx="36" fill="none" stroke="#26262b" stroke-width="2"/>

  <!-- brand row -->
  <g transform="translate(152 130)">
    <rect x="0" y="0" width="52" height="52" rx="15" fill="url(#amber)"/>
    <rect x="13" y="13" width="6" height="26" rx="3" fill="#000"/>
    <rect x="33" y="13" width="6" height="26" rx="3" fill="#000"/>
    <rect x="13" y="23" width="26" height="6" rx="3" fill="#000"/>
    <text x="70" y="22" fill="#f5f5f7" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="26" font-weight="700">TRAINING LOG</text>
    <text x="70" y="46" fill="#86868b" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500">FIT PLACE 東寺尾</text>
  </g>

  <!-- dashboard stats -->
  <g transform="translate(152 210)">
    <rect x="0" y="0" width="320" height="120" rx="22" fill="#161619" stroke="#26262b" stroke-width="2"/>
    <text x="26" y="40" fill="#86868b" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="500">今週のセッション</text>
    <text x="26" y="90" fill="#f5f5f7" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="44" font-weight="800">4<tspan font-size="18" fill="#86868b">回</tspan></text>

    <rect x="352" y="0" width="320" height="120" rx="22" fill="#1a1408" stroke="#3d2f10" stroke-width="2"/>
    <text x="378" y="40" fill="#ff9f0a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="500">今週の総挙上量</text>
    <text x="378" y="90" fill="#ff9f0a" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="44" font-weight="800">18,240<tspan font-size="18" fill="#a8771f">kg</tspan></text>

    <rect x="704" y="0" width="328" height="120" rx="22" fill="#161619" stroke="#26262b" stroke-width="2"/>
    <text x="730" y="40" fill="#86868b" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="500">記録数</text>
    <text x="730" y="90" fill="#f5f5f7" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="44" font-weight="800">126</text>
  </g>

  <!-- chart card -->
  <g transform="translate(152 360)">
    <rect x="0" y="0" width="880" height="270" rx="26" fill="#161619" stroke="#26262b" stroke-width="2"/>
    <text x="30" y="46" fill="#f5f5f7" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">ベンチプレス — 推定1RM</text>
    <text x="690" y="46" fill="#30d158" font-family="ui-monospace,monospace" font-size="20" font-weight="700">+12.5 kg</text>
    <!-- gridlines -->
    <g stroke="#26262b" stroke-width="1.5" stroke-dasharray="5 5">
      <line x1="30" y1="100" x2="850" y2="100"/>
      <line x1="30" y1="150" x2="850" y2="150"/>
      <line x1="30" y1="200" x2="850" y2="200"/>
    </g>
    <!-- area -->
    <path d="M60 190 L210 168 L360 178 L510 132 L660 118 L810 84 L810 230 L60 230 Z" fill="#ff9f0a" fill-opacity="0.14"/>
    <!-- line -->
    <path d="M60 190 L210 168 L360 178 L510 132 L660 118 L810 84" fill="none" stroke="url(#amber)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#161619" stroke="#ff9f0a" stroke-width="5">
      <circle cx="60" cy="190" r="7"/>
      <circle cx="210" cy="168" r="7"/>
      <circle cx="360" cy="178" r="7"/>
      <circle cx="510" cy="132" r="7"/>
      <circle cx="660" cy="118" r="7"/>
      <circle cx="810" cy="84" r="8"/>
    </g>
  </g>
</svg>
