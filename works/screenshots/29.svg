<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Migration Simulator thumbnail</title>
  <desc id="desc">Glassmorphism thumbnail for a Tokyo/Yokohama relocation income simulator.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e4ebf1"/>
      <stop offset="1" stop-color="#d5dee7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a90e2"/>
      <stop offset="1" stop-color="#005a9c"/>
    </linearGradient>
    <pattern id="shippo" width="60" height="60" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#27344B" stroke-width="1.8" stroke-opacity="0.16">
        <circle cx="0" cy="0" r="30"/><circle cx="60" cy="0" r="30"/>
        <circle cx="0" cy="60" r="30"/><circle cx="60" cy="60" r="30"/>
        <circle cx="30" cy="30" r="30"/>
      </g>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#27344b" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#shippo)"/>

  <!-- header -->
  <g transform="translate(120 96)">
    <text x="0" y="0" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="2">LIFE PLAN ESTIMATE 2026.06</text>
    <text x="0" y="52" fill="#1d1d1f" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="48" font-weight="800">移住シミュレーター</text>
    <text x="0" y="86" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="500">東京・横浜の区別相場 × 住まい方から必要年収を算出</text>
  </g>

  <!-- left: input glass panel -->
  <g transform="translate(120 230)">
    <rect x="0" y="0" width="520" height="490" rx="22" fill="rgba(255,255,255,0.62)" stroke="#ffffff" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- area row -->
    <text x="28" y="50" fill="#1d1d1f" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">エリア</text>
    <text x="492" y="50" fill="#005a9c" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" text-anchor="end">鶴見区 ›</text>
    <line x1="20" y1="76" x2="500" y2="76" stroke="#000" stroke-opacity="0.08" stroke-width="1"/>
    <!-- segmented: 住まい -->
    <text x="28" y="118" fill="#1d1d1f" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">住まい</text>
    <g transform="translate(28 134)">
      <rect x="0" y="0" width="464" height="50" rx="10" fill="rgba(255,255,255,0.5)" stroke="#fff" stroke-width="1"/>
      <rect x="4" y="4" width="150" height="42" rx="7" fill="#ffffff"/>
      <text x="79" y="31" fill="#1d1d1f" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" text-anchor="middle">賃貸</text>
      <text x="232" y="31" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="18" text-anchor="middle">購入</text>
      <text x="385" y="31" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="18" text-anchor="middle">実家承継</text>
    </g>
    <!-- slider -->
    <text x="28" y="240" fill="#1d1d1f" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">現在の年齢</text>
    <text x="492" y="240" fill="#58585c" font-family="ui-monospace,monospace" font-size="20" font-weight="600" text-anchor="end">39歳</text>
    <g transform="translate(28 262)">
      <rect x="0" y="0" width="464" height="10" rx="5" fill="rgba(255,255,255,0.5)" stroke="#fff" stroke-width="1"/>
      <rect x="0" y="0" width="220" height="10" rx="5" fill="url(#blue)"/>
      <circle cx="220" cy="5" r="16" fill="#fff" stroke="#000" stroke-opacity="0.1" stroke-width="1"/>
    </g>
    <!-- bar chart -->
    <text x="28" y="350" fill="#1d1d1f" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">内訳</text>
    <g transform="translate(28 366)">
      <rect x="0" y="0" width="200" height="18" rx="9" fill="#005a9c"/>
      <rect x="204" y="0" width="120" height="18" rx="9" fill="#227d51"/>
      <rect x="328" y="0" width="70" height="18" rx="9" fill="#c35c14"/>
      <rect x="402" y="0" width="62" height="18" rx="9" fill="#27344b"/>
    </g>
    <!-- rank rows -->
    <g transform="translate(28 412)" font-family="ui-monospace,monospace">
      <text x="0" y="14" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="15">泉区</text>
      <rect x="80" y="6" width="180" height="8" rx="4" fill="#005a9c" opacity="0.85"/>
      <text x="464" y="14" fill="#1d1d1f" font-size="15" font-weight="600" text-anchor="end">512万</text>
      <text x="0" y="44" fill="#005a9c" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">鶴見区</text>
      <rect x="80" y="36" width="245" height="8" rx="4" fill="#005a9c"/>
      <text x="464" y="44" fill="#1d1d1f" font-size="15" font-weight="600" text-anchor="end">631万</text>
    </g>
  </g>

  <!-- right: result glass panel -->
  <g transform="translate(672 230)">
    <rect x="0" y="0" width="488" height="490" rx="22" fill="rgba(255,255,255,0.62)" stroke="#ffffff" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="32" y="56" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600">必要世帯年収（額面）</text>
    <text x="244" y="158" fill="#1d1d1f" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="84" font-weight="800" text-anchor="middle">631<tspan font-size="32" font-weight="600">万円</tspan></text>
    <!-- stacked bar -->
    <g transform="translate(32 200)">
      <rect x="0" y="0" width="210" height="18" rx="9" fill="#005a9c"/>
      <rect x="212" y="0" width="120" height="18" rx="9" fill="#227d51"/>
      <rect x="334" y="0" width="50" height="18" rx="9" fill="#7058a3"/>
      <rect x="386" y="0" width="38" height="18" rx="9" fill="#27344b"/>
    </g>
    <!-- verdict box with stamp -->
    <g transform="translate(32 270)">
      <rect x="0" y="0" width="424" height="110" rx="14" fill="rgba(255,255,255,0.45)"/>
      <text x="24" y="42" fill="#58585c" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="600">自分に必要な年収（単身）</text>
      <text x="24" y="86" fill="#1d1d1f" font-family="'SF Pro Display',Inter,Arial,sans-serif" font-size="40" font-weight="800">631万円</text>
      <g transform="translate(340 55) rotate(-10)">
        <circle cx="0" cy="0" r="42" fill="rgba(255,255,255,0.6)" stroke="#227d51" stroke-width="4"/>
        <text x="0" y="-4" fill="#227d51" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" text-anchor="middle">射程</text>
        <text x="0" y="20" fill="#227d51" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" text-anchor="middle">内</text>
      </g>
    </g>
    <!-- month table hint -->
    <g transform="translate(32 408)" font-family="Inter,Arial,sans-serif">
      <text x="0" y="0" fill="#58585c" font-size="16" font-weight="600">手取り必要額 / 月</text>
      <text x="424" y="0" fill="#1d1d1f" font-size="20" font-weight="700" text-anchor="end" font-family="ui-monospace,monospace">42.1万</text>
      <line x1="0" y1="20" x2="424" y2="20" stroke="#000" stroke-opacity="0.08" stroke-width="1"/>
      <text x="0" y="52" fill="#58585c" font-size="16" font-weight="600">必要老後資金（65歳時点）</text>
      <text x="424" y="52" fill="#1d1d1f" font-size="20" font-weight="700" text-anchor="end" font-family="ui-monospace,monospace">2,340万</text>
    </g>
  </g>
</svg>
