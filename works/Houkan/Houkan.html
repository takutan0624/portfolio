            document.getElementById('patientDetail').classList.add('active');
        }

        // ---- Update Patient Status ----
        async function updatePatientStatus(id, status) {
            if (db) {
                await updateDoc(visitDoc(id), { status });
            } else {
                const p = patients.find(p => p.id === id);
                if (p) { p.status = status; refreshUI(); }
            }
            document.getElementById('patientDetail').classList.remove('active');
        }

        // ---- Focus on Map and Close ----
        function focusOnMapAndClose(id) {
            document.getElementById('patientDetail').classList.remove('active');
            setTimeout(() => focusOnMap(id), 300);
        }

        // ---- Delete Patient ----
        async function deletePatient(id) {
            if (!confirm('この患者を削除しますか?')) return;
            if (db) {
                await deleteDoc(visitDoc(id));
            } else {
                patients = patients.filter(p => p.id !== id);
                refreshUI();
            }
            document.getElementById('patientDetail').classList.remove('active');
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Bottom Sheet Toggle
            const bottomSheet = document.getElementById('bottomSheet');
            const sheetHandle = document.getElementById('sheetHandle');

            sheetHandle.addEventListener('click', () => {
                bottomSheet.classList.toggle('expanded');
            });

            // Touch handling for bottom sheet
            let startY = 0;

            sheetHandle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            });

            sheetHandle.addEventListener('touchmove', (e) => {
                const diff = startY - e.touches[0].clientY;
                if (diff > 50 && !bottomSheet.classList.contains('expanded')) {
                    bottomSheet.classList.add('expanded');
                } else if (diff < -50 && bottomSheet.classList.contains('expanded')) {
                    bottomSheet.classList.remove('expanded');
                }
            });

            // Filter Pills
            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    currentFilter = pill.dataset.filter;
                    renderVisitList(currentFilter);
                });
            });

            // Tab Bar
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // Schedule filter pills
            document.querySelectorAll('[data-schedule-filter]').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('[data-schedule-filter]').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    currentScheduleFilter = pill.dataset.scheduleFilter;
                    renderVisitList(currentScheduleFilter, '', 'scheduleList');
                });
            });

            // Add Patient Modal
            document.getElementById('addPatientBtn').addEventListener('click', () => {
                document.getElementById('addModal').classList.add('active');
            });

            document.getElementById('modalClose').addEventListener('click', () => {
                document.getElementById('addModal').classList.remove('active');
            });

            document.getElementById('addModal').addEventListener('click', (e) => {
                if (e.target.id === 'addModal') {
                    document.getElementById('addModal').classList.remove('active');
                }
            });

            document.getElementById('modalSave').addEventListener('click', () => {
                const form = document.getElementById('patientForm');
                if (form.checkValidity()) {
                    saveNewPatient();
                } else {
                    form.reportValidity();
                }
            });

            // Back Button
            document.getElementById('backBtn').addEventListener('click', () => {
                document.getElementById('patientDetail').classList.remove('active');
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderVisitList(currentFilter, e.target.value);
            });

            // Refresh
            document.getElementById('refreshBtn').addEventListener('click', () => {
                renderVisitList(currentFilter);
                updateMapMarkers();
            });
        }

        // Save New Patient
        async function saveNewPatient() {
            const name    = document.getElementById('patientName').value;
            const age     = document.getElementById('patientAge').value;
            const phone   = document.getElementById('patientPhone').value;
            const address = document.getElementById('patientAddress').value;
            const nurse   = document.getElementById('assignedNurse').value;
            const time    = document.getElementById('visitTime').value;
            const notes   = document.getElementById('patientNotes').value;

            if (!name || !age || !phone || !address || !nurse) return;

            const newVisit = {
                name, age: parseInt(age), address, phone, nurse,
                notes: notes || '特記事項なし',
                lat: 35.5085 + (Math.random() - 0.5) * 0.05,
                lng: 139.6792 + (Math.random() - 0.5) * 0.05,
                status: 'scheduled', time,
                color: avatarColors[Math.floor(Math.random() * avatarColors.length)],
                visitDate: TODAY
            };

            if (db) {
                await addDoc(visitsCol(), newVisit);
                // onSnapshot が自動でUIを更新
            } else {
                patients.push({ id: String(Date.now()), ...newVisit });
                refreshUI();
            }

            document.getElementById('patientForm').reset();
            document.getElementById('addModal').classList.remove('active');
        }


        // Switch Tab
        function switchTab(tabName) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

            const isMap = tabName === 'map';
            document.getElementById('bottomSheet').style.display = isMap ? '' : 'none';

            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));

            if (tabName === 'schedule') {
                document.getElementById('viewSchedule').classList.add('active');
                fetchMonthVisitDates(calendarYear, calendarMonth).then(() => {
                    renderCalendar();
                    datePatients = [...patients];
                    loadScheduleDate(selectedDate);
                });
            } else if (tabName === 'patients') {
                document.getElementById('viewPatients').classList.add('active');
                renderPatientsView();
            } else if (tabName === 'settings') {
                document.getElementById('viewSettings').classList.add('active');
                renderSettingsView();
            } else if (tabName === 'stats') {
                document.getElementById('viewStats').classList.add('active');
                renderStatsView();
            }
        }

        // Render Patients View
        function renderPatientsView() {
            const container = document.getElementById('patientCardList');
            document.getElementById('patientCountLabel').textContent = `${patients.length}名登録中`;
            const statusText = { scheduled: '予定', completed: '完了', pending: '保留' };

            container.innerHTML = patients.map(p => `
                <div class="patient-card-item" onclick="window.showPatientDetail('${p.id}')">
                    <div class="patient-card-avatar ${p.color}">${p.name.slice(0, 2)}</div>
                    <div class="patient-card-info">
                        <div class="patient-card-name">${p.name} <span style="font-size:13px;font-weight:400;color:var(--text-secondary);">${p.age}歳</span></div>
                        <div class="patient-card-meta">${p.nurse} | ${p.time}</div>
                        <div class="patient-card-meta">${p.phone}</div>
                    </div>
                    <span class="status-badge ${p.status}">${statusText[p.status]}</span>
                </div>
            `).join('');
        }

        // Render Settings View
        function renderSettingsView() {
            document.getElementById('settingsStaffList').innerHTML = staff.map(s => `
                <div class="settings-staff-item">
                    <div class="staff-avatar">${s.name.slice(0, 1)}</div>
                    <span class="staff-name">${s.name}</span>
                    <div class="staff-row-actions">
                        <button class="staff-delete-btn" onclick="window.deleteStaff('${s.id}')">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ---- Calendar ----
        async function fetchMonthVisitDates(year, month) {
            monthVisitDates = new Set();
            if (!db) {
                MOCK_VISITS.forEach(v => monthVisitDates.add(v.visitDate));
                return;
            }
            const pad = n => String(n).padStart(2, '0');
            const start = `${year}-${pad(month + 1)}-01`;
            const end   = `${year}-${pad(month + 1)}-${new Date(year, month + 1, 0).getDate()}`;
            try {
                const q = query(visitsCol(), where('visitDate', '>=', start), where('visitDate', '<=', end));
                const snap = await getDocs(q);
                snap.forEach(d => monthVisitDates.add(d.data().visitDate));
            } catch {}
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            if (!container) return;
            const firstDay   = new Date(calendarYear, calendarMonth, 1).getDay();
            const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
            const monthTitle = new Date(calendarYear, calendarMonth, 1)
                .toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' });
            const dayNames = ['日','月','火','水','木','金','土'];

            let cells = '';
            for (let i = 0; i < firstDay; i++) cells += `<div class="cal-cell empty"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const pad = n => String(n).padStart(2, '0');
                const dateStr  = `${calendarYear}-${pad(calendarMonth + 1)}-${pad(d)}`;
                const dow      = (firstDay + d - 1) % 7;
                const dowClass = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
                const isToday    = dateStr === TODAY;
                const isSelected = dateStr === selectedDate;
                const hasDot     = monthVisitDates.has(dateStr);
                cells += `
                    <div class="cal-cell ${dowClass} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}"
                         onclick="window.selectCalendarDate('${dateStr}')">
                        <span class="cal-day-num">${d}</span>
                        ${hasDot ? '<span class="cal-dot"></span>' : ''}
                    </div>`;
            }

            container.innerHTML = `
                <div class="calendar-wrapper">
                    <div class="calendar-nav">
                        <button class="cal-nav-btn" onclick="window.calendarPrev()">‹</button>
                        <span class="calendar-month-title">${monthTitle}</span>
                        <button class="cal-nav-btn" onclick="window.calendarNext()">›</button>
                    </div>
                    <div class="calendar-day-headers">
                        ${dayNames.map((n,i) => `<div class="cal-day-header ${i===0?'sun':i===6?'sat':''}">${n}</div>`).join('')}
                    </div>
                    <div class="calendar-grid">${cells}</div>
                </div>`;

            const label = document.getElementById('calendarSelectedLabel');
            if (label) {
                label.textContent = new Date(selectedDate + 'T00:00:00')
                    .toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
            }
        }

        async function loadScheduleDate(dateStr) {
            if (dateStr === TODAY) {
                datePatients = [...patients];
            } else if (db) {
                try {
                    const q = query(visitsCol(), where('visitDate', '==', dateStr), orderBy('time'));
                    const snap = await getDocs(q);
                    datePatients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                } catch { datePatients = []; }
            } else {
                datePatients = MOCK_VISITS.filter(v => v.visitDate === dateStr)
                    .map((v, i) => ({ id: String(i + 1), ...v }));
            }
            renderVisitList(currentScheduleFilter, '', 'scheduleList');
        }

        window.selectCalendarDate = async function(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            await loadScheduleDate(dateStr);
        };

        window.calendarPrev = async function() {
            calendarMonth--;
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            await fetchMonthVisitDates(calendarYear, calendarMonth);
            renderCalendar();
        };

        window.calendarNext = async function() {
            calendarMonth++;
            if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            await fetchMonthVisitDates(calendarYear, calendarMonth);
            renderCalendar();
        };

        // ---- Staff Management ----
        window.promptAddStaff = async function() {
            const name = prompt('スタッフ名を入力してください');
            if (!name || !name.trim()) return;
            const newStaff = { name: name.trim() };
            if (db) {
                const ref = await addDoc(staffCol(), newStaff);
                staff.push({ id: ref.id, ...newStaff });
            } else {
                staff.push({ id: String(Date.now()), ...newStaff });
            }
            populateNurseSelect();
            renderSettingsView();
        };

        window.deleteStaff = async function(id) {
            if (!confirm('このスタッフを削除しますか？')) return;
            if (db) {
                try { await deleteDoc(staffDocRef(id)); } catch {}
            }
            staff = staff.filter(s => s.id !== id);
            populateNurseSelect();
            renderSettingsView();
        };

        // ---- Stats ----
        function renderStatsView() {
            document.getElementById('statsDateLabel').textContent =
                new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });

            // Destroy old charts
            Object.values(statsCharts).forEach(c => c.destroy());
            statsCharts = {};

            const scheduled = patients.filter(p => p.status === 'scheduled').length;
            const completed = patients.filter(p => p.status === 'completed').length;
            const pending   = patients.filter(p => p.status === 'pending').length;

            // Donut: status breakdown
            statsCharts.status = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['予定', '完了', '保留'],
                    datasets: [{ data: [scheduled, completed, pending],
                        backgroundColor: ['#007AFF','#34C759','#FF9500'],
                        borderWidth: 0, hoverOffset: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom',
                        labels: { font: { family: 'Inter', size: 12 }, padding: 16 } } } }
            });

            // Bar: past 7 days (mock history + today's real count)
            const labels = [];
            const counts = [11, 14, 9, 13, 10, 12, patients.length];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                labels.push(d.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' }));
            }
            statsCharts.history = new Chart(document.getElementById('chartHistory'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{ label: '訪問件数', data: counts,
                        backgroundColor: labels.map((_, i) => i === 6 ? '#007AFF' : 'rgba(0,122,255,0.25)'),
                        borderRadius: 6, borderSkipped: false }]
                },
                options: { responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 5 },
                        grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } } } }
            });

            // Horizontal bar: nurse breakdown
            const nurseCounts = {};
            patients.forEach(p => { nurseCounts[p.nurse] = (nurseCounts[p.nurse] || 0) + 1; });
            const nurseLabels = Object.keys(nurseCounts);
            const nurseData   = Object.values(nurseCounts);
            const palette = ['#007AFF','#34C759','#FF9500','#FF2D55','#AF52DE'];
            statsCharts.nurse = new Chart(document.getElementById('chartNurse'), {
                type: 'bar',
                data: {
                    labels: nurseLabels,
                    datasets: [{ label: '担当件数', data: nurseData,
                        backgroundColor: nurseLabels.map((_, i) => palette[i % palette.length]),
                        borderRadius: 6, borderSkipped: false }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 },
                        grid: { color: 'rgba(0,0,0,0.05)' } },
                        y: { grid: { display: false } } } }
            });
        }

        // ---- Window exports (inline onclick用) ----
        window.updatePatientStatus = updatePatientStatus;
        window.deletePatient       = deletePatient;
        window.focusOnMap          = focusOnMap;
        window.focusOnMapAndClose  = focusOnMapAndClose;
        window.showPatientDetail   = showPatientDetail;

        // ---- Boot ----
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
